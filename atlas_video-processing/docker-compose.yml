version: '3.8'

services:
  kafka:
    image: confluentinc/cp-kafka:8.3.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # Confluent Platform 8.x uses KRaft mode; ZooKeeper settings are unsupported.
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  ingest-drone:
    build:
      context: ./ingest/drone_client
    image: atlas/ingest-drone
    container_name: ingest-drone
    depends_on:
      - kafka
    # ports:
    #   - "5000:5000"

  ingest-camera:
    build:
      context: ./ingest/camera_client
    image: atlas/ingest-camera
    container_name: ingest-camera
    depends_on:
      - kafka
    # ports:
    #   - "5001:5001"

  processing:
    build:
      context: ./processing/video_stream_processor
    image: atlas/processing
    container_name: processing
    depends_on:
      - kafka
    # ports:
    #   - "5002:5002"

  control:
    build:
      context: ./control
    image: atlas/control
    container_name: control
    # ports:
    #   - "5003:5003"

  llm_service:
    build:
      context: ./llm_service
    image: atlas/llm_service
    container_name: llm_service
    # ports:
    #   - "5004:5004"

  db:
    image: postgres:18
    container_name: db
    environment:
      - POSTGRES_USER=${ATLAS_VISION_DB_USER:-user}
      - POSTGRES_PASSWORD=${ATLAS_VISION_DB_PASSWORD:-password}
      - POSTGRES_DB=${ATLAS_VISION_DB_NAME:-atlas}
    ports:
      - "5432:5432"
    volumes:
      # Postgres major versions cannot reuse an older PGDATA directory. Keep
      # PG18 on a separate volume and migrate persisted PG13 data by dump/restore.
      - postgres18_data:/var/lib/postgresql/data/

volumes:
  # Legacy PG13 data volume. Do not mount this directly into the PG18 service.
  postgres_data:
  postgres18_data:
