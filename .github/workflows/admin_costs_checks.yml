name: Admin Costs Checks

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/admin_costs_checks.yml"
      - "requirements.txt"
      - "extracted_content_pipeline/**"
      - "atlas_brain/api/admin_costs.py"
      - "tests/test_admin_costs.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/admin_costs_checks.yml"
      - "requirements.txt"
      - "extracted_content_pipeline/**"
      - "atlas_brain/api/admin_costs.py"
      - "tests/test_admin_costs.py"

jobs:
  admin-costs-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Run admin costs tests
        run: python -m pytest tests/test_admin_costs.py -q
