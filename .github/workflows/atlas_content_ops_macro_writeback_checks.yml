name: Atlas Content Ops Macro Writeback Checks

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/atlas_content_ops_macro_writeback_checks.yml"
      - "requirements.txt"
      - "extracted_content_pipeline/**"
      - "atlas_brain/autonomous/runner.py"
      - "atlas_brain/autonomous/scheduler.py"
      - "atlas_brain/autonomous/tasks/faq_macro_writeback_scheduled_publish.py"
      - "atlas_brain/autonomous/tasks/__init__.py"
      - "atlas_brain/config.py"
      - "scripts/check_content_ops_faq_macro_lifecycle_artifact.py"
      - "scripts/cleanup_content_ops_faq_macro_sandbox.py"
      - "scripts/smoke_content_ops_faq_macro_sandbox_e2e.py"
      - "scripts/smoke_content_ops_faq_macro_sandbox_lifecycle.py"
      - "scripts/seed_faq_macro_writeback_live_smoke_draft.py"
      - "tests/test_autonomous_faq_macro_writeback_scheduled_publish.py"
      - "tests/test_check_content_ops_faq_macro_lifecycle_artifact.py"
      - "tests/test_cleanup_content_ops_faq_macro_sandbox.py"
      - "tests/test_extracted_ticket_faq_macro_writeback_zendesk.py"
      - "tests/test_faq_macro_writeback_sandbox_e2e_smoke.py"
      - "tests/test_faq_macro_writeback_sandbox_lifecycle.py"
      - "tests/test_seed_faq_macro_writeback_live_smoke_draft.py"
      - "tests/test_scheduler.py"
      - "tests/test_synthesis.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/atlas_content_ops_macro_writeback_checks.yml"
      - "requirements.txt"
      - "extracted_content_pipeline/**"
      - "atlas_brain/autonomous/runner.py"
      - "atlas_brain/autonomous/scheduler.py"
      - "atlas_brain/autonomous/tasks/faq_macro_writeback_scheduled_publish.py"
      - "atlas_brain/autonomous/tasks/__init__.py"
      - "atlas_brain/config.py"
      - "scripts/check_content_ops_faq_macro_lifecycle_artifact.py"
      - "scripts/cleanup_content_ops_faq_macro_sandbox.py"
      - "scripts/smoke_content_ops_faq_macro_sandbox_e2e.py"
      - "scripts/smoke_content_ops_faq_macro_sandbox_lifecycle.py"
      - "scripts/seed_faq_macro_writeback_live_smoke_draft.py"
      - "tests/test_autonomous_faq_macro_writeback_scheduled_publish.py"
      - "tests/test_check_content_ops_faq_macro_lifecycle_artifact.py"
      - "tests/test_cleanup_content_ops_faq_macro_sandbox.py"
      - "tests/test_extracted_ticket_faq_macro_writeback_zendesk.py"
      - "tests/test_faq_macro_writeback_sandbox_e2e_smoke.py"
      - "tests/test_faq_macro_writeback_sandbox_lifecycle.py"
      - "tests/test_seed_faq_macro_writeback_live_smoke_draft.py"
      - "tests/test_scheduler.py"
      - "tests/test_synthesis.py"

jobs:
  atlas-content-ops-macro-writeback-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Run Content Ops macro writeback scheduler tests
        run: |
          python -m pytest \
            tests/test_autonomous_faq_macro_writeback_scheduled_publish.py \
            tests/test_check_content_ops_faq_macro_lifecycle_artifact.py \
            tests/test_cleanup_content_ops_faq_macro_sandbox.py \
            tests/test_extracted_ticket_faq_macro_writeback_zendesk.py \
            tests/test_faq_macro_writeback_sandbox_e2e_smoke.py \
            tests/test_faq_macro_writeback_sandbox_lifecycle.py \
            tests/test_seed_faq_macro_writeback_live_smoke_draft.py \
            tests/test_scheduler.py::TestDefaults::test_content_ops_faq_macro_writeback_default_seed_respects_opt_in \
            tests/test_scheduler.py::TestDefaults::test_content_ops_faq_macro_writeback_default_notifies_skipped_summary \
            tests/test_synthesis.py::TestRunBuiltinSynthesis::test_skip_synthesis_notify_opt_in_uses_fallback_message \
            tests/test_synthesis.py::TestRunBuiltinSynthesis::test_skip_synthesis_notify_failure_is_nonfatal \
            tests/test_synthesis.py::TestRunBuiltinSynthesis::test_skip_synthesis_without_notify_opt_in_keeps_existing_response_shape \
            -q
