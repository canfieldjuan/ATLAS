# .github/workflows/marketing_content_check.yml
name: Marketing Content Voice Check

on:
  pull_request:
    paths:
      - 'marketing/landing_pages/**'
      - 'marketing/blog_posts/**'
      - 'marketing/release_notes/**'
      - 'marketing/tweets/**'

jobs:
  validate-voice:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # Need the base SHA so the diff below can resolve; the default
          # shallow (fetch-depth 1) checkout makes `git diff base head` error
          # and the gate fails red on every normal PR.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML
          # In a real project, you'd install your full requirements.txt
          # pip install -r requirements.txt

      - name: Validate brand voice on all changed marketing files
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          files="$(git diff --name-only "$base" "$head" -- 'marketing/**')"
          if [ -z "$files" ]; then
            echo "No marketing content changed; nothing to validate."
            exit 0
          fi

          status=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            # A file deleted in the PR no longer exists in the workspace.
            [ -f "$file" ] || { echo "Skipping removed file: $file"; continue; }

            case "$file" in
              marketing/landing_pages/*) type="landing_page" ;;
              marketing/blog_posts/*)    type="blog_post" ;;
              marketing/release_notes/*) type="release_notes" ;;
              marketing/tweets/*)        type="tweet" ;;
              *)
                # Surface, never silently pass an unrecognized marketing path.
                echo "Skipping unrecognized marketing path: $file"
                continue
                ;;
            esac

            echo "Validating $file (type=$type)"
            if ! python atlas_brain/services/brand_voice_validator.py --file "$file" --type "$type"; then
              status=1
            fi
          done <<< "$files"

          exit "$status"
