name: Brand Voice Checks

on:
  pull_request:
    paths:
      - ".github/workflows/atlas_brand_voice_checks.yml"
      - "requirements.txt"
      - "atlas_brain/brand/**"
      - "atlas_brain/skills/brand/brand_voice.yml"
      - "tests/test_brand_voice_validator.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/atlas_brand_voice_checks.yml"
      - "requirements.txt"
      - "atlas_brain/brand/**"
      - "atlas_brain/skills/brand/brand_voice.yml"
      - "tests/test_brand_voice_validator.py"

jobs:
  brand-voice-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-asyncio

      - name: Run brand voice validator tests
        run: python -m pytest tests/test_brand_voice_validator.py -q
