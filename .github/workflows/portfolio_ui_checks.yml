name: Portfolio UI Checks

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/portfolio_ui_checks.yml"
      - "portfolio-ui/api/**"
      - "portfolio-ui/package.json"
      - "portfolio-ui/package-lock.json"
      - "portfolio-ui/scripts/**"
      - "portfolio-ui/src/**"
      - "portfolio-ui/vercel.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/portfolio_ui_checks.yml"
      - "portfolio-ui/api/**"
      - "portfolio-ui/package.json"
      - "portfolio-ui/package-lock.json"
      - "portfolio-ui/scripts/**"
      - "portfolio-ui/src/**"
      - "portfolio-ui/vercel.json"

jobs:
  portfolio-ui-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"

      - name: Test FAQ deflection upload shell
        run: npm run test:deflection-upload-shell

      - name: Test FAQ deflection result page
        run: npm run test:deflection-result

      - name: Test FAQ deflection full-report QA hosted smoke
        run: npm run test:deflection-full-report-qa-hosted-smoke

      - name: Test FAQ deflection ATLAS proxy
        run: npm run test:deflection-atlas-proxy
