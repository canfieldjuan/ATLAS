name: Maturity Sweep Deflection Content Ops

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/maturity_sweep_deflection_content_ops.yml"
      - "scripts/maturity_sweep.py"
      - "scripts/maturity_sweep_file_lane.py"
      - "scripts/check_deflection_product_surface_manifest.py"
      - "tests/**"
      - "extracted_content_pipeline/**"
      - "atlas-intel-ui/scripts/content-ops-deflection-report-ui.test.mjs"
      - "atlas-intel-ui/src/domain/contentOps/*Deflection*"
      - "atlas-intel-ui/src/domain/contentOps/*deflection*"
      - "atlas_brain/*content_ops*.py"
      - "atlas_brain/**/*content_ops*.py"
      - "atlas_brain/*deflection*.py"
      - "atlas_brain/**/*deflection*.py"
      - "atlas_brain/storage/migrations/*deflection*.sql"
      - "docs/frontend/content_ops_faq_deflection_*"
      - "docs/frontend/content_ops_faq_report_contract.md"
      - "docs/frontend/content_ops_faq_report_example.json"
      - "portfolio-ui/api/content-ops/deflection/**"
      - "portfolio-ui/scripts/faq-deflection*.mjs"
      - "portfolio-ui/src/pages/*Deflection*.tsx"
      - "portfolio-ui/src/pages/*deflection*.tsx"
      - "portfolio-ui/vercel.json"
      - "scripts/*content_ops*.py"
      - "scripts/**/*content_ops*.py"
      - "scripts/*deflection*.py"
      - "scripts/**/*deflection*.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/maturity_sweep_deflection_content_ops.yml"
      - "scripts/maturity_sweep.py"
      - "scripts/maturity_sweep_file_lane.py"
      - "scripts/check_deflection_product_surface_manifest.py"
      - "tests/**"
      - "extracted_content_pipeline/**"
      - "atlas-intel-ui/scripts/content-ops-deflection-report-ui.test.mjs"
      - "atlas-intel-ui/src/domain/contentOps/*Deflection*"
      - "atlas-intel-ui/src/domain/contentOps/*deflection*"
      - "atlas_brain/*content_ops*.py"
      - "atlas_brain/**/*content_ops*.py"
      - "atlas_brain/*deflection*.py"
      - "atlas_brain/**/*deflection*.py"
      - "atlas_brain/storage/migrations/*deflection*.sql"
      - "docs/frontend/content_ops_faq_deflection_*"
      - "docs/frontend/content_ops_faq_report_contract.md"
      - "docs/frontend/content_ops_faq_report_example.json"
      - "portfolio-ui/api/content-ops/deflection/**"
      - "portfolio-ui/scripts/faq-deflection*.mjs"
      - "portfolio-ui/src/pages/*Deflection*.tsx"
      - "portfolio-ui/src/pages/*deflection*.tsx"
      - "portfolio-ui/vercel.json"
      - "scripts/*content_ops*.py"
      - "scripts/**/*content_ops*.py"
      - "scripts/*deflection*.py"
      - "scripts/**/*deflection*.py"

jobs:
  maturity-sweep-deflection-content-ops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --quiet pytest

      - name: Sweep unit tests (blocking)
        run: python -m pytest tests/test_maturity_sweep.py --noconftest -q

      - name: Deflection product surface manifest (blocking)
        run: python scripts/check_deflection_product_surface_manifest.py

      - name: Deflection and AI content ops ratchet gates (blocking)
        run: |
          set -euo pipefail
          mapfile -t deflection_lane < <(
            find atlas_brain scripts extracted_content_pipeline \
              -type f -name '*deflection*.py' | sort -u
          )
          mapfile -t ai_content_ops_lane < <(
            find atlas_brain scripts \
              -type f -name '*content_ops*.py' ! -name '*deflection*.py' | sort -u
          )

          echo "::group::deflection_lane"
          python scripts/maturity_sweep_file_lane.py "${deflection_lane[@]}" \
            --tests-root tests \
            --baseline tests/maturity_sweep/baseline_deflection_lane.json \
            --min-score 8 \
            --sensitive-glob '*deflection*' \
            --sensitive-glob '**/billing/**' \
            --sensitive-glob '**/billing*' \
            --sensitive-glob '**/paid*' \
            --sensitive-glob '**/auth/**' \
            --sensitive-glob '**/auth*' \
            --sensitive-glob '**/webhook*' \
            --sensitive-glob '**/webhooks/**' \
            --sensitive-glob '**/payment*' \
            --sensitive-glob '**/invoicing/**' \
            --sensitive-glob '**/*invoice*' \
            --sensitive-glob '**/*deletion*'
          echo "::endgroup::"

          echo "::group::ai_content_ops_lane"
          python scripts/maturity_sweep_file_lane.py "${ai_content_ops_lane[@]}" \
            --tests-root tests \
            --baseline tests/maturity_sweep/baseline_ai_content_ops_lane.json \
            --min-score 8 \
            --sensitive-glob '*content_ops*'
          echo "::endgroup::"
