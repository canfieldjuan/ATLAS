name: Extracted Pipeline Checks

on:
  pull_request:
    paths:
      - "extracted_content_pipeline/**"
      - "extracted_reasoning_core/**"
      - "atlas_brain/reasoning/state.py"
      - "atlas_brain/reasoning/port_adapters.py"
      - "atlas_brain/reasoning/vendor_pressure.py"
      - "atlas_brain/reasoning/call_transcript.py"
      - "atlas_brain/reasoning/agent.py"
      - "atlas_brain/reasoning/reflection.py"
      - "atlas_brain/reasoning/tiers.py"
      - "atlas_brain/reasoning/wedge_registry.py"
      - "atlas_brain/reasoning/temporal.py"
      - "atlas_brain/reasoning/graph.py"
      - "atlas_brain/autonomous/tasks/_b2b_reasoning_consumer_adapter.py"
      - "atlas_brain/mcp/b2b/signals.py"
      - "scripts/sync_extracted_content_pipeline.sh"
      - "scripts/validate_extracted_content_pipeline.sh"
      - "scripts/check_ascii_python.sh"
      - "scripts/check_extracted_imports.py"
      - "scripts/audit_extracted_standalone.py"
      - "scripts/smoke_extracted_pipeline_imports.py"
      - "scripts/run_extracted_pipeline_checks.sh"
      - "tests/test_extracted_campaign_*.py"
      - "tests/test_extracted_vendor_briefing_*.py"
      - "tests/test_extracted_content_pipeline_reasoning_*.py"
      - "tests/test_extracted_reasoning_core_*.py"
      - "tests/test_atlas_reasoning_state_*.py"
      - "tests/test_atlas_reasoning_port_adapters.py"
      - "tests/test_atlas_reasoning_vendor_pressure.py"
      - "tests/test_atlas_reasoning_call_transcript.py"
      - "tests/test_atlas_reasoning_agent_port_consumption.py"
      - "tests/test_atlas_reasoning_reflection_tracing.py"
      - "tests/test_atlas_reasoning_graph_aliases.py"
      - "tests/test_atlas_reasoning_run_reasoning_graph_wiring.py"
      - "tests/test_atlas_reasoning_tiers_aliases.py"
      - "tests/test_atlas_reasoning_wedge_registry_aliases.py"
      - "tests/test_atlas_reasoning_temporal_aliases.py"
      - "tests/test_forbid_atlas_reasoning_imports.py"
      - "extracted/_shared/scripts/forbid_atlas_reasoning_imports.py"
  push:
    paths:
      - "extracted_content_pipeline/**"
      - "extracted_reasoning_core/**"
      - "atlas_brain/reasoning/state.py"
      - "atlas_brain/reasoning/port_adapters.py"
      - "atlas_brain/reasoning/vendor_pressure.py"
      - "atlas_brain/reasoning/call_transcript.py"
      - "atlas_brain/reasoning/agent.py"
      - "atlas_brain/reasoning/reflection.py"
      - "atlas_brain/reasoning/tiers.py"
      - "atlas_brain/reasoning/wedge_registry.py"
      - "atlas_brain/reasoning/temporal.py"
      - "atlas_brain/reasoning/graph.py"
      - "atlas_brain/autonomous/tasks/_b2b_reasoning_consumer_adapter.py"
      - "atlas_brain/mcp/b2b/signals.py"
      - "scripts/sync_extracted_content_pipeline.sh"
      - "scripts/validate_extracted_content_pipeline.sh"
      - "scripts/check_ascii_python.sh"
      - "scripts/check_extracted_imports.py"
      - "scripts/audit_extracted_standalone.py"
      - "scripts/smoke_extracted_pipeline_imports.py"
      - "scripts/run_extracted_pipeline_checks.sh"
      - "tests/test_extracted_campaign_*.py"
      - "tests/test_extracted_vendor_briefing_*.py"
      - "tests/test_extracted_content_pipeline_reasoning_*.py"
      - "tests/test_extracted_reasoning_core_*.py"
      - "tests/test_atlas_reasoning_state_*.py"
      - "tests/test_atlas_reasoning_port_adapters.py"
      - "tests/test_atlas_reasoning_vendor_pressure.py"
      - "tests/test_atlas_reasoning_call_transcript.py"
      - "tests/test_atlas_reasoning_agent_port_consumption.py"
      - "tests/test_atlas_reasoning_reflection_tracing.py"
      - "tests/test_atlas_reasoning_graph_aliases.py"
      - "tests/test_atlas_reasoning_run_reasoning_graph_wiring.py"
      - "tests/test_atlas_reasoning_tiers_aliases.py"
      - "tests/test_atlas_reasoning_wedge_registry_aliases.py"
      - "tests/test_atlas_reasoning_temporal_aliases.py"
      - "tests/test_forbid_atlas_reasoning_imports.py"
      - "extracted/_shared/scripts/forbid_atlas_reasoning_imports.py"

jobs:
  extracted-checks:
    runs-on: ubuntu-latest
    env:
      EXTRACTED_PIPELINE_STANDALONE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        # PyYAML is added so the core evidence-engine tests can exercise
        # the YAML default-load path. content_pipeline itself remains
        # yaml-free at module import time -- the wrapper carries rules
        # as an in-memory _DEFAULT_RULES dict and routes through
        # EvidenceEngine.from_rules (per PR-C1i). yaml is only needed
        # by the *core* tests that load extracted_reasoning_core/evidence_map.yaml.
        # pydantic-settings is needed because the atlas reasoning-state
        # inheritance test imports atlas_brain.reasoning.state, which
        # triggers atlas_brain/reasoning/__init__.py -> config.py ->
        # pydantic_settings. content_pipeline itself does not depend on
        # pydantic-settings; this is purely the cross-boundary seam test.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio beautifulsoup4 httpx PyJWT pyyaml pydantic-settings

      - name: Run extracted pipeline checks
        run: bash scripts/run_extracted_pipeline_checks.sh
