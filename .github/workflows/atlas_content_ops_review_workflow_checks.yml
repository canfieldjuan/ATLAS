name: Atlas Content Ops Review Workflow Checks

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/atlas_content_ops_review_workflow_checks.yml"
      - "requirements.txt"
      - "extracted_content_pipeline/**"
      - "atlas_brain/_content_ops_review_workflow.py"
      - "atlas_brain/mcp/content_ops_marketer_verify_chatgpt_adapter_server.py"
      - "atlas_brain/mcp/content_ops_marketer_verify_server.py"
      - "atlas_brain/_content_ops_calibration_library.py"
      - "atlas_brain/api/__init__.py"
      - "atlas_brain/auth/**"
      - "atlas_brain/api/content_ops_calibration_library.py"
      - "atlas_brain/storage/migrations/335_content_ops_calibration_library.sql"
      - "atlas_brain/storage/migrations/338_saas_users_is_admin.sql"
      - "atlas_brain/_content_ops_claim_registry.py"
      - "atlas_brain/api/content_ops_claim_registry.py"
      - "atlas_brain/storage/migrations/334_content_ops_claim_registry.sql"
      - "extracted_content_pipeline/campaign_ports.py"
      - "extracted_content_pipeline/claims_map.py"
      - "extracted_content_pipeline/content_pr.py"
      - "extracted_content_pipeline/review_contract.py"
      - "scripts/check_content_ops_marketer_verify_oauth_discovery.py"
      - "scripts/check_content_ops_marketer_verify_oauth_e2e.py"
      - "scripts/check_content_ops_marketer_verify_dual_client_rollout.py"
      - "scripts/check_content_ops_marketer_verify_claude_hosted_oauth.py"
      - "scripts/start_content_ops_marketer_verify_chatgpt_adapter_oauth_server.py"
      - "scripts/start_content_ops_marketer_verify_oauth_server.py"
      - "tests/test_atlas_content_ops_review_workflow.py"
      - "tests/test_content_ops_calibration_library.py"
      - "tests/test_content_ops_calibration_library_live_db.py"
      - "tests/test_content_ops_calibration_library_live_app.py"
      - "tests/test_content_ops_calibration_library_api.py"
      - "tests/test_content_ops_claim_registry_api.py"
      - "tests/test_check_content_ops_marketer_verify_claude_hosted_oauth.py"
      - "tests/test_check_content_ops_marketer_verify_oauth_e2e.py"
      - "tests/test_check_content_ops_marketer_verify_dual_client_rollout.py"
      - "tests/test_content_ops_marketer_verify_launcher_contract.py"
      - "tests/test_start_content_ops_marketer_verify_chatgpt_adapter_oauth_server.py"
      - "tests/test_mcp_content_ops_marketer_verify.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/atlas_content_ops_review_workflow_checks.yml"
      - "requirements.txt"
      - "extracted_content_pipeline/**"
      - "atlas_brain/_content_ops_review_workflow.py"
      - "atlas_brain/mcp/content_ops_marketer_verify_chatgpt_adapter_server.py"
      - "atlas_brain/mcp/content_ops_marketer_verify_server.py"
      - "atlas_brain/_content_ops_calibration_library.py"
      - "atlas_brain/api/__init__.py"
      - "atlas_brain/auth/**"
      - "atlas_brain/api/content_ops_calibration_library.py"
      - "atlas_brain/storage/migrations/335_content_ops_calibration_library.sql"
      - "atlas_brain/storage/migrations/338_saas_users_is_admin.sql"
      - "atlas_brain/_content_ops_claim_registry.py"
      - "atlas_brain/api/content_ops_claim_registry.py"
      - "atlas_brain/storage/migrations/334_content_ops_claim_registry.sql"
      - "extracted_content_pipeline/campaign_ports.py"
      - "extracted_content_pipeline/claims_map.py"
      - "extracted_content_pipeline/content_pr.py"
      - "extracted_content_pipeline/review_contract.py"
      - "scripts/check_content_ops_marketer_verify_oauth_discovery.py"
      - "scripts/check_content_ops_marketer_verify_oauth_e2e.py"
      - "scripts/check_content_ops_marketer_verify_dual_client_rollout.py"
      - "scripts/check_content_ops_marketer_verify_claude_hosted_oauth.py"
      - "scripts/start_content_ops_marketer_verify_chatgpt_adapter_oauth_server.py"
      - "scripts/start_content_ops_marketer_verify_oauth_server.py"
      - "tests/test_atlas_content_ops_review_workflow.py"
      - "tests/test_content_ops_calibration_library.py"
      - "tests/test_content_ops_calibration_library_live_db.py"
      - "tests/test_content_ops_calibration_library_live_app.py"
      - "tests/test_content_ops_calibration_library_api.py"
      - "tests/test_content_ops_claim_registry_api.py"
      - "tests/test_check_content_ops_marketer_verify_claude_hosted_oauth.py"
      - "tests/test_check_content_ops_marketer_verify_oauth_e2e.py"
      - "tests/test_check_content_ops_marketer_verify_dual_client_rollout.py"
      - "tests/test_content_ops_marketer_verify_launcher_contract.py"
      - "tests/test_start_content_ops_marketer_verify_chatgpt_adapter_oauth_server.py"
      - "tests/test_mcp_content_ops_marketer_verify.py"

jobs:
  atlas-content-ops-review-workflow-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_migration_tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas_migration_tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ATLAS_MIGRATION_TEST_DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas_migration_tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Run Content Ops review workflow tests
        run: |
          python -m pytest \
            tests/test_atlas_content_ops_review_workflow.py \
            tests/test_content_ops_calibration_library.py \
            tests/test_content_ops_calibration_library_live_db.py \
            tests/test_content_ops_calibration_library_live_app.py \
            tests/test_content_ops_calibration_library_api.py \
            tests/test_content_ops_claim_registry_api.py \
            tests/test_check_content_ops_marketer_verify_claude_hosted_oauth.py \
            tests/test_check_content_ops_marketer_verify_dual_client_rollout.py \
            tests/test_check_content_ops_marketer_verify_oauth_e2e.py \
            tests/test_content_ops_marketer_verify_launcher_contract.py \
            tests/test_start_content_ops_marketer_verify_chatgpt_adapter_oauth_server.py \
            tests/test_mcp_content_ops_marketer_verify.py \
            -q
