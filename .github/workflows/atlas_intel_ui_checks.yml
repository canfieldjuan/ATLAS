name: Atlas Intel UI Checks

on:
  pull_request:
    paths:
      - ".github/workflows/atlas_intel_ui_checks.yml"
      - "atlas-intel-ui/package.json"
      - "atlas-intel-ui/package-lock.json"
      - "atlas-intel-ui/tsconfig*.json"
      - "atlas-intel-ui/vite.config.ts"
      - "atlas-intel-ui/public/**"
      - "atlas-intel-ui/scripts/**"
      - "atlas-intel-ui/src/**"
      - "docs/frontend/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/atlas_intel_ui_checks.yml"
      - "atlas-intel-ui/package.json"
      - "atlas-intel-ui/package-lock.json"
      - "atlas-intel-ui/tsconfig*.json"
      - "atlas-intel-ui/vite.config.ts"
      - "atlas-intel-ui/public/**"
      - "atlas-intel-ui/scripts/**"
      - "atlas-intel-ui/src/**"
      - "docs/frontend/**"

jobs:
  atlas-intel-ui-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-intel-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: atlas-intel-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test landing-page prerender verifier
        run: npm run test:landing-page-prerender

      - name: Test public generated blog posts
        run: npm run test:blog-public-generated-posts

      - name: Test Content Ops deflection report UI
        run: npm run test:content-ops-deflection-report-ui

      - name: Test Content Ops FAQ configuration inputs
        run: npm run test:content-ops-faq-configuration-inputs

      - name: Test Content Ops landing-page review deep link
        run: npm run test:content-ops-landing-page-e2e-ui

      - name: Test Content Ops blog review public link
        run: npm run test:content-ops-blog-review-public-link

      - name: Build
        run: npm run build

      - name: Verify blog GEO prerender
        run: npm run verify:blog-geo

      - name: Verify landing-page GEO prerender
        run: npm run verify:landing-page-geo
