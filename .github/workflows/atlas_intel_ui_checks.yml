name: Atlas Intel UI Checks

on:
  pull_request:
    paths:
      - ".github/workflows/atlas_intel_ui_checks.yml"
      - "atlas-intel-ui/package.json"
      - "atlas-intel-ui/package-lock.json"
      - "atlas-intel-ui/tsconfig*.json"
      - "atlas-intel-ui/vite.config.ts"
      - "atlas-intel-ui/public/**"
      - "atlas-intel-ui/scripts/**"
      - "atlas-intel-ui/src/**"
      - "docs/frontend/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/atlas_intel_ui_checks.yml"
      - "atlas-intel-ui/package.json"
      - "atlas-intel-ui/package-lock.json"
      - "atlas-intel-ui/tsconfig*.json"
      - "atlas-intel-ui/vite.config.ts"
      - "atlas-intel-ui/public/**"
      - "atlas-intel-ui/scripts/**"
      - "atlas-intel-ui/src/**"
      - "docs/frontend/**"

jobs:
  atlas-intel-ui-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas-intel-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: atlas-intel-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test landing-page prerender verifier
        run: npm run test:landing-page-prerender

      - name: Test public generated blog posts
        run: npm run test:blog-public-generated-posts

      - name: Test generated blog sitemap prerender
        run: npm run test:blog-generated-sitemap-prerender

      - name: Test Content Ops deflection report UI
        run: npm run test:content-ops-deflection-report-ui

      - name: Test Content Ops FAQ configuration inputs
        run: npm run test:content-ops-faq-configuration-inputs

      - name: Test Content Ops ingestion routing
        run: npm run test:content-ops-ingestion-routing

      - name: Test Content Ops landing-page review deep link
        run: npm run test:content-ops-landing-page-e2e-ui

      - name: Test Content Ops upload source run handoff
        run: npm run test:content-ops-upload-source-run-handoff

      - name: Test Content Ops brand voice profile selector
        run: npm run test:content-ops-brand-voice-profile-selector

      - name: Test Content Ops brand voice settings page
        run: npm run test:content-ops-brand-voice-settings-page

      - name: Test Content Ops blog review public link
        run: npm run test:content-ops-blog-review-public-link

      - name: Test Content Ops social post review assets
        run: npm run test:content-ops-social-post-review-assets

      - name: Test Content Ops social post channel selector
        run: npm run test:content-ops-social-post-channel-selector

      - name: Test Content Ops ad copy review assets
        run: npm run test:content-ops-ad-copy-review-assets

      - name: Test Content Ops quote card review assets
        run: npm run test:content-ops-quote-card-review-assets

      - name: Test Content Ops stat card review assets
        run: npm run test:content-ops-stat-card-review-assets

      - name: Test Content Ops review source selection
        run: npm run test:content-ops-review-source-selection

      - name: Test Content Ops cache policy UI
        run: npm run test:content-ops-cache-policy-ui

      - name: Test Content Ops FAQ macro publish
        run: npm run test:content-ops-faq-macro-publish

      - name: Test Content Ops FAQ source selection
        run: npm run test:content-ops-faq-source-selection

      - name: Test Content Ops ingestion limits
        run: npm run test:content-ops-ingestion-limits

      - name: Test Content Ops input display
        run: npm run test:content-ops-input-display

      - name: Test Content Ops usage budget UI
        run: npm run test:content-ops-usage-budget-ui

      - name: Test Content Ops usage summary
        run: npm run test:content-ops-usage-summary

      - name: Test Content Ops zendesk credentials
        run: npm run test:content-ops-zendesk-credentials

      - name: Test landing-page sitemap bridge
        run: npm run test:sitemap-bridge

      - name: Build
        run: npm run build

      - name: Verify blog GEO prerender
        run: npm run verify:blog-geo

      - name: Verify landing-page GEO prerender
        run: npm run verify:landing-page-geo
