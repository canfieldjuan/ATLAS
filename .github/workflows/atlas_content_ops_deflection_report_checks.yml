name: Atlas Content Ops Deflection Report Checks

permissions:
  contents: read

on:
  pull_request:
    paths:
      - ".github/workflows/atlas_content_ops_deflection_report_checks.yml"
      - "requirements.txt"
      - "atlas_brain/autonomous/scheduler.py"
      - "atlas_brain/autonomous/tasks/__init__.py"
      - "atlas_brain/autonomous/tasks/content_ops_deflection_delta_automation.py"
      - "atlas_brain/config.py"
      - "atlas_brain/deflection_pdf_renderer.py"
      - "extracted_content_pipeline/**"
      - "extracted_content_pipeline/faq_deflection_report.py"
      - "extracted_content_pipeline/ticket_faq_markdown.py"
      - "scripts/build_content_ops_deflection_report.py"
      - "scripts/check_deflection_full_report_pdf_export_artifacts.py"
      - "scripts/generate_deflection_frontend_contract_types.py"
      - "scripts/purge_content_ops_deflection_reports.py"
      - "scripts/run_deflection_full_report_qa_live_runner.py"
      - "portfolio-ui/api/content-ops/deflection/snapshot-contract.js"
      - "portfolio-ui/api/content-ops/deflection/report-model-contract.js"
      - "portfolio-ui/src/types/deflectionReportModel.ts"
      - "portfolio-ui/src/types/deflectionSnapshot.ts"
      - "tests/test_content_ops_deflection_report.py"
      - "tests/test_deflection_delta_automation_task.py"
      - "tests/test_deflection_snapshot_report_drift.py"
      - "tests/test_generate_deflection_frontend_contract_types.py"
      - "tests/test_extracted_content_ops_live_execute_harness.py"
      - "tests/test_extracted_ticket_faq_markdown.py"
      - "tests/test_run_deflection_full_report_qa_live_runner.py"
      - "tests/test_smoke_content_ops_deflection_pdf_export_validators.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/atlas_content_ops_deflection_report_checks.yml"
      - "requirements.txt"
      - "atlas_brain/autonomous/scheduler.py"
      - "atlas_brain/autonomous/tasks/__init__.py"
      - "atlas_brain/autonomous/tasks/content_ops_deflection_delta_automation.py"
      - "atlas_brain/config.py"
      - "atlas_brain/deflection_pdf_renderer.py"
      - "extracted_content_pipeline/**"
      - "extracted_content_pipeline/faq_deflection_report.py"
      - "extracted_content_pipeline/ticket_faq_markdown.py"
      - "scripts/build_content_ops_deflection_report.py"
      - "scripts/check_deflection_full_report_pdf_export_artifacts.py"
      - "scripts/generate_deflection_frontend_contract_types.py"
      - "scripts/purge_content_ops_deflection_reports.py"
      - "scripts/run_deflection_full_report_qa_live_runner.py"
      - "portfolio-ui/api/content-ops/deflection/snapshot-contract.js"
      - "portfolio-ui/api/content-ops/deflection/report-model-contract.js"
      - "portfolio-ui/src/types/deflectionReportModel.ts"
      - "portfolio-ui/src/types/deflectionSnapshot.ts"
      - "tests/test_content_ops_deflection_report.py"
      - "tests/test_deflection_delta_automation_task.py"
      - "tests/test_deflection_snapshot_report_drift.py"
      - "tests/test_generate_deflection_frontend_contract_types.py"
      - "tests/test_extracted_content_ops_live_execute_harness.py"
      - "tests/test_extracted_ticket_faq_markdown.py"
      - "tests/test_run_deflection_full_report_qa_live_runner.py"
      - "tests/test_smoke_content_ops_deflection_pdf_export_validators.py"

jobs:
  atlas-content-ops-deflection-report-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_migration_tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas_migration_tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ATLAS_MIGRATION_TEST_DATABASE_URL: postgresql://atlas:atlas@localhost:5432/atlas_migration_tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install asyncpg pytest pytest-asyncio

      - name: Run Content Ops deflection report tests
        run: |
          python -m pytest \
            tests/test_extracted_ticket_faq_markdown.py::test_build_ticket_faq_markdown_skips_non_ticket_sources_and_validates_limits \
            tests/test_extracted_ticket_faq_markdown.py::test_build_ticket_faq_markdown_treats_zero_max_items_as_unlimited \
            tests/test_extracted_ticket_faq_markdown.py::test_build_ticket_faq_markdown_condenses_overflow_sources_instead_of_truncating \
            tests/test_generate_deflection_frontend_contract_types.py \
            tests/test_extracted_content_ops_live_execute_harness.py::test_deflection_report_execute_uncaps_paid_artifact_and_keeps_snapshot_top_n \
            tests/test_content_ops_deflection_report.py::test_postgres_deflection_report_store_live_round_trips_paid_gate \
            tests/test_content_ops_deflection_report.py::test_postgres_list_reports_live_scopes_paid_state_and_orders_newest \
            tests/test_content_ops_deflection_report.py::test_postgres_delete_report_live_scopes_to_account_and_request_id \
            tests/test_content_ops_deflection_report.py::test_deflection_report_cli_ignores_legacy_max_items_cap \
            tests/test_content_ops_deflection_report.py::test_in_memory_report_retention_deletes_only_old_rows_with_limit \
            tests/test_content_ops_deflection_report.py::test_report_retention_store_rejects_unsafe_boundaries \
            tests/test_content_ops_deflection_report.py::test_postgres_report_retention_live_deletes_old_rows_with_limit \
            tests/test_content_ops_deflection_report.py::test_postgres_report_retention_fails_closed_on_unparseable_delete_count \
            tests/test_content_ops_deflection_report.py::test_retention_runner_dry_run_counts_without_deleting_or_exposing_payload \
            tests/test_content_ops_deflection_report.py::test_retention_runner_requires_confirm_delete_and_valid_bounds \
            tests/test_content_ops_deflection_report.py::test_retention_runner_rejects_invalid_args_before_opening_pool \
            tests/test_content_ops_deflection_report.py::test_retention_runner_resolves_database_url_from_non_argv_sources \
            tests/test_content_ops_deflection_report.py::test_retention_runner_preflights_output_before_opening_pool \
            tests/test_content_ops_deflection_report.py::test_retention_runner_output_failure_after_purge_falls_back_to_stdout \
            tests/test_deflection_delta_automation_task.py \
            tests/test_deflection_snapshot_report_drift.py \
            tests/test_run_deflection_full_report_qa_live_runner.py \
            tests/test_smoke_content_ops_deflection_pdf_export_validators.py \
            -q

      - name: Check generated frontend deflection contract types
        run: python scripts/generate_deflection_frontend_contract_types.py --check
