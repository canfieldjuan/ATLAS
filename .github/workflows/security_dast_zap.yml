name: Security DAST ZAP

on:
  workflow_dispatch:
  schedule:
    - cron: "43 10 * * 2"

permissions:
  contents: read

jobs:
  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve target URL
        id: target
        env:
          DEFAULT_TARGET_URL: ${{ vars.ATLAS_DAST_TARGET_URL }}
        run: |
          target="$DEFAULT_TARGET_URL"
          if [ -z "$target" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Set repository variable ATLAS_DAST_TARGET_URL to run DAST."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "url=$target" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.target.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ZAP baseline
        if: steps.target.outputs.configured == 'true'
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ steps.target.outputs.url }}
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-baseline-report
          cmd_options: "-a"
