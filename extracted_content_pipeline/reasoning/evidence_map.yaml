# Content-pipeline-specific evidence rules.
#
# These conclusions and suppression sections are tuned for the consumer-
# review pipeline (Amazon-shaped vendor evidence). They were previously
# embedded as `_DEFAULT_RULES` in `evidence_engine.py`; PR-C1i carved
# them into this YAML so the engine implementation can be sourced from
# the shared `extracted_reasoning_core` module instead of carrying a
# parallel fork.
#
# Conventions:
#   - conclusions use the explicit {field, operator, value} requirement form
#   - suppression rules use the shorthand {field, lt|lte|gt|gte} form
#     (this is what extracted_reasoning_core's _check_suppression_rule
#     handles directly)

confidence_tiers:
  high: {min_reviews: 80, label: "High confidence"}
  medium: {min_reviews: 25, label: "Medium confidence"}
  low: {min_reviews: 5, label: "Low confidence"}
  insufficient: {min_reviews: 0, label: "Insufficient evidence"}

conclusions:

  insufficient_data:
    trigger:
      - {field: total_reviews, operator: lt, value: 20}
    label: "Insufficient evidence"
    action: "Collect more reviews before making directional claims."

  pricing_crisis:
    requires:
      - {field: total_reviews, operator: gte, value: 50}
      - {field: pain_distribution.pricing.count, operator: gte, value: 10}
      - {field: pricing_phrases_total, operator: gte, value: 3}
    confidence_when_met: medium
    amplifiers:
      - {field: pain_distribution.pricing.source_count, operator: gte, value: 3, boost_confidence: high}
    fallback:
      label: "Pricing signal not established"
      action: "Use pain wording without claiming pricing is the primary driver."

  losing_market_share:
    requires:
      - {field: total_reviews, operator: gte, value: 50}
      - {field: displacement_edge.mention_count, operator: gte, value: 5}
      - {field: displacement_edge.signal_strength, operator: in, values: [moderate, strong]}
    confidence_when_met: medium
    amplifiers:
      - {field: displacement_edge.net_flow, operator: lte, value: -5, boost_confidence: high}
    fallback:
      label: "Displacement signal not established"
      action: "Avoid share-loss framing until displacement evidence improves."

  active_churn_wave:
    requires:
      - {field: total_reviews, operator: gte, value: 40}
      - {field: indicator_counts.active_evaluation_language, operator: gte, value: 4}
      - {field: indicator_counts.explicit_cancel_language, operator: gte, value: 2}
    confidence_when_met: high
    fallback:
      label: "Active churn wave not established"
      action: "Frame as retention risk, not an active churn wave."

  support_quality_risk:
    requires:
      - {field: total_reviews, operator: gte, value: 40}
      - {field: pain_distribution.support.count, operator: gte, value: 8}
    confidence_when_met: medium
    fallback:
      label: "Support quality risk not established"
      action: "Use generic dissatisfaction wording."

suppression:

  executive_summary:
    suppress_when:
      - {field: total_reviews, lt: 20}
    degrade_when:
      - {field: total_reviews, lt: 50}
    fallback_label: "Not enough evidence for an executive summary"
    disclaimer: "Directional summary based on a limited evidence base."

  target_accounts:
    suppress_when:
      - {field: named_company_count, lte: 0}
    fallback_label: "No named-account evidence available"

  recommend_ratio:
    suppress_when:
      - {field: recommend_denominator, lt: 5}
    fallback_label: "Recommendation sample too small"
