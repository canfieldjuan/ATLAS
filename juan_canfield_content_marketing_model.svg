<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arAmber" markerWidth="12" markerHeight="12" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#d97706"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="900" fill="#ffffff"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="96" fill="#0b1f3a"/>
  <text x="40" y="46" fill="#ffffff" font-size="30" font-weight="700">How I Ship Marketing Content</text>
  <text x="40" y="76" fill="#9fb3d1" font-size="15">The dev operating model, adapted: the artifact is structured data, the test is the market, and the LLM produces evidence -- never verdicts.</text>
  <text x="1160" y="42" fill="#5b7aa6" font-size="13" text-anchor="end">Juan Canfield</text>
  <text x="1160" y="62" fill="#5b7aa6" font-size="13" text-anchor="end">Founding / Staff AI Platform Engineer</text>

  <!-- Section: lifecycle -->
  <text x="40" y="134" fill="#0b1f3a" font-size="15" font-weight="700">THE LIFECYCLE</text>
  <text x="208" y="134" fill="#64748b" font-size="12">publish is the midpoint, not the finish -- the value compounds in a living record of what worked</text>
  <line x1="40" y1="142" x2="1160" y2="142" stroke="#e2e8f0" stroke-width="1"/>

  <!-- arrows -->
  <g stroke="#64748b" stroke-width="2">
    <line x1="183" y1="196" x2="202" y2="196" marker-end="url(#ar)"/>
    <line x1="346" y1="196" x2="365" y2="196" marker-end="url(#ar)"/>
    <line x1="509" y1="196" x2="528" y2="196" marker-end="url(#ar)"/>
    <line x1="672" y1="196" x2="691" y2="196" marker-end="url(#ar)"/>
    <line x1="835" y1="196" x2="854" y2="196" marker-end="url(#ar)"/>
    <line x1="998" y1="196" x2="1017" y2="196" marker-end="url(#ar)"/>
  </g>

  <!-- node template helper inline -->
  <!-- 0 Triage -->
  <rect x="41" y="150" width="140" height="92" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="54" y="174" fill="#0b1f3a" font-size="13" font-weight="700">Triage</text>
  <text x="54" y="198" fill="#475569" font-size="9">"Should this exist?"</text>
  <text x="54" y="212" fill="#475569" font-size="9">create / clone-a-winner /</text>
  <text x="54" y="226" fill="#475569" font-size="9">defer / reject.</text>

  <!-- 1 Brief + Schema -->
  <rect x="204" y="150" width="140" height="92" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="217" y="174" fill="#0b1f3a" font-size="13" font-weight="700">Brief + Schema</text>
  <text x="217" y="198" fill="#475569" font-size="9">Contract = interface:</text>
  <text x="217" y="212" fill="#475569" font-size="9">typed brief (intent) +</text>
  <text x="217" y="226" fill="#475569" font-size="9">asset schema. No UI.</text>

  <!-- 2 Draft -->
  <rect x="367" y="150" width="140" height="92" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="380" y="174" fill="#0b1f3a" font-size="13" font-weight="700">Draft</text>
  <text x="380" y="198" fill="#475569" font-size="9">Writer fills fields first,</text>
  <text x="380" y="212" fill="#475569" font-size="9">prose second, against</text>
  <text x="380" y="226" fill="#475569" font-size="9">an evidence packet.</text>

  <!-- 3 Gate Stack -->
  <rect x="530" y="150" width="140" height="92" rx="9" fill="#ffffff" stroke="#0d9488" stroke-width="2.5"/>
  <text x="543" y="174" fill="#0b1f3a" font-size="13" font-weight="700">Gate Stack</text>
  <text x="543" y="198" fill="#475569" font-size="9">4 sub-gates (below):</text>
  <text x="543" y="212" fill="#475569" font-size="9">schema, claims, model-</text>
  <text x="543" y="226" fill="#475569" font-size="9">evidence, human editor.</text>

  <!-- 4 Editor -->
  <rect x="693" y="150" width="140" height="92" rx="9" fill="#ffffff" stroke="#0d9488" stroke-width="2.5"/>
  <text x="706" y="174" fill="#0b1f3a" font-size="13" font-weight="700">Editor</text>
  <text x="706" y="198" fill="#475569" font-size="9">Independent. Coverage</text>
  <text x="706" y="212" fill="#475569" font-size="9">matrix, cited evidence,</text>
  <text x="706" y="226" fill="#475569" font-size="9">logged exceptions.</text>

  <!-- 5 Publish (midpoint) -->
  <rect x="856" y="150" width="140" height="92" rx="9" fill="#fff7ed" stroke="#d97706" stroke-width="2.5"/>
  <text x="869" y="174" fill="#9a3412" font-size="13" font-weight="700">Publish</text>
  <text x="869" y="198" fill="#7c2d12" font-size="9">MIDPOINT. Experiment</text>
  <text x="869" y="212" fill="#7c2d12" font-size="9">contract (hypothesis,</text>
  <text x="869" y="226" fill="#7c2d12" font-size="9">metric, window) frozen first.</text>

  <!-- 6 Verdict + Compound -->
  <rect x="1019" y="150" width="140" height="92" rx="9" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="1032" y="174" fill="#0b1f3a" font-size="12.5" font-weight="700">Verdict + Compound</text>
  <text x="1032" y="198" fill="#475569" font-size="9">Wait the window; the</text>
  <text x="1032" y="212" fill="#475569" font-size="9">market decides. Structured</text>
  <text x="1032" y="226" fill="#475569" font-size="9">"why" -&gt; flywheels.</text>

  <!-- flywheel loop -->
  <path d="M1089,242 C1089,300 111,300 111,244" fill="none" stroke="#d97706" stroke-width="2.5" marker-end="url(#arAmber)"/>
  <rect x="372" y="272" width="456" height="34" rx="17" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
  <text x="600" y="294" fill="#9a3412" font-size="12.5" font-weight="600" text-anchor="middle">Two flywheels: miss -&gt; gate (at a 3+ threshold) &#183; win -&gt; reusable prior &#183; override -&gt; calibration</text>

  <!-- Section: gate stack -->
  <text x="40" y="338" fill="#0b1f3a" font-size="15" font-weight="700">THE FOUR-PART GATE STACK</text>
  <text x="320" y="338" fill="#64748b" font-size="12">deterministic where it can be; the LLM lints and argues, the human decides, the market settles effectiveness</text>
  <line x1="40" y1="346" x2="1160" y2="346" stroke="#e2e8f0" stroke-width="1"/>

  <!-- gate cards: x=32,320,608,896 w=272 h=126 y=362 -->
  <g>
    <rect x="32" y="362" width="272" height="126" rx="10" fill="#f1f5f9"/>
    <rect x="32" y="362" width="6" height="126" rx="3" fill="#2563eb"/>
    <text x="54" y="390" fill="#0b1f3a" font-size="13.5" font-weight="700">3A &#183; Schema</text>
    <rect x="220" y="375" width="74" height="20" rx="10" fill="#dbeafe"/><text x="257" y="389" fill="#1e40af" font-size="10" text-anchor="middle">system</text>
    <text x="54" y="414" fill="#475569" font-size="10.5">Required fields, asset format,</text>
    <text x="54" y="430" fill="#475569" font-size="10.5">channel constraints, word</text>
    <text x="54" y="446" fill="#475569" font-size="10.5">count, CTA present.</text>
    <text x="54" y="470" fill="#1e40af" font-size="10" font-style="italic">deterministic</text>
  </g>
  <g>
    <rect x="320" y="362" width="272" height="126" rx="10" fill="#f1f5f9"/>
    <rect x="320" y="362" width="6" height="126" rx="3" fill="#2563eb"/>
    <text x="342" y="390" fill="#0b1f3a" font-size="13.5" font-weight="700">3B &#183; Claims / Compliance</text>
    <rect x="508" y="375" width="74" height="20" rx="10" fill="#dbeafe"/><text x="545" y="389" fill="#1e40af" font-size="10" text-anchor="middle">system</text>
    <text x="342" y="414" fill="#475569" font-size="10.5">Auto "claims map": every claim</text>
    <text x="342" y="430" fill="#475569" font-size="10.5">matched to a versioned registry</text>
    <text x="342" y="446" fill="#475569" font-size="10.5">(approved wording, risk, expiry).</text>
    <text x="342" y="470" fill="#1e40af" font-size="10" font-style="italic">deterministic -- stops inventing a lawsuit</text>
  </g>
  <g>
    <rect x="608" y="362" width="272" height="126" rx="10" fill="#f1f5f9"/>
    <rect x="608" y="362" width="6" height="126" rx="3" fill="#0d9488"/>
    <text x="630" y="390" fill="#0b1f3a" font-size="13.5" font-weight="700">3C &#183; Model evidence</text>
    <rect x="796" y="375" width="74" height="20" rx="10" fill="#ccfbf1"/><text x="833" y="389" fill="#0f766e" font-size="10" text-anchor="middle">editor</text>
    <text x="630" y="414" fill="#475569" font-size="10.5">LLM fills a PASS/FAIL coverage</text>
    <text x="630" y="430" fill="#475569" font-size="10.5">matrix with cited spans + an</text>
    <text x="630" y="446" fill="#475569" font-size="10.5">adversarial pass. Never "LGTM".</text>
    <text x="630" y="470" fill="#0f766e" font-size="10" font-style="italic">evidence, not a verdict</text>
  </g>
  <g>
    <rect x="896" y="362" width="272" height="126" rx="10" fill="#f1f5f9"/>
    <rect x="896" y="362" width="6" height="126" rx="3" fill="#0d9488"/>
    <text x="918" y="390" fill="#0b1f3a" font-size="13.5" font-weight="700">3D &#183; Human editor</text>
    <rect x="1084" y="375" width="74" height="20" rx="10" fill="#ccfbf1"/><text x="1121" y="389" fill="#0f766e" font-size="10" text-anchor="middle">editor</text>
    <text x="918" y="414" fill="#475569" font-size="10.5">The accountable call: taste,</text>
    <text x="918" y="430" fill="#475569" font-size="10.5">persuasion, brief quality.</text>
    <text x="918" y="446" fill="#475569" font-size="10.5">BLOCK / REVISE / APPROVE / EXCEPTION.</text>
    <text x="918" y="470" fill="#0f766e" font-size="10" font-style="italic">effectiveness -&gt; settled by the market</text>
  </g>

  <!-- Section: source of truth + MCP -->
  <text x="40" y="528" fill="#0b1f3a" font-size="15" font-weight="700">LIVING SOURCE OF TRUTH</text>
  <text x="640" y="528" fill="#0b1f3a" font-size="15" font-weight="700">THE MCP SERVER (read-only)</text>
  <line x1="40" y1="536" x2="592" y2="536" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="640" y1="536" x2="1160" y2="536" stroke="#e2e8f0" stroke-width="1"/>

  <!-- left: quartet -->
  <rect x="32" y="552" width="560" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="50" y="576" fill="#475569" font-size="11.5" font-style="italic">queried before every brief -- the opposite of a write-only archive</text>
  <g font-size="11.5">
    <circle cx="58" cy="600" r="4" fill="#2563eb"/><text x="72" y="604" fill="#0b1f3a" font-weight="600">Campaign ledger</text><text x="210" y="604" fill="#475569">one lightweight verdict per piece (worked / why)</text>
    <circle cx="58" cy="626" r="4" fill="#2563eb"/><text x="72" y="630" fill="#0b1f3a" font-weight="600">Claim registry</text><text x="210" y="630" fill="#475569">canonical stats / prices / positioning -- the 3B source</text>
    <circle cx="58" cy="652" r="4" fill="#0d9488"/><text x="72" y="656" fill="#0b1f3a" font-weight="600">Brand-voice contract</text><text x="232" y="656" fill="#475569">the rules 3C drift-review scores against</text>
    <circle cx="58" cy="678" r="4" fill="#0d9488"/><text x="72" y="682" fill="#0b1f3a" font-weight="600">Calibration library</text><text x="222" y="682" fill="#475569">worked examples + verdicts; overrides feed it</text>
  </g>

  <!-- right: MCP server panel -->
  <rect x="620" y="552" width="548" height="150" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <rect x="620" y="552" width="6" height="150" rx="3" fill="#4f46e5"/>
  <text x="642" y="578" fill="#312e81" font-size="13" font-weight="700">Content Ops Deflection MCP -- ChatGPT-compatible connector</text>
  <!-- tool chips -->
  <rect x="642" y="590" width="92" height="24" rx="12" fill="#4f46e5"/><text x="688" y="606" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">search()</text>
  <rect x="744" y="590" width="80" height="24" rx="12" fill="#4f46e5"/><text x="784" y="606" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">fetch()</text>
  <text x="838" y="607" fill="#4338ca" font-size="11">exactly the 2-tool connector contract -- nothing more</text>
  <g font-size="10.5">
    <text x="642" y="636" fill="#3730a3" font-weight="600">Tenant-bound by construction</text><text x="838" y="636" fill="#475569" text-anchor="end">never takes account_id as an arg; resolved server-side</text>
    <text x="642" y="658" fill="#3730a3" font-weight="600">Unpaid-safe only</text><text x="1150" y="658" fill="#475569" text-anchor="end">free snapshots; full_report_locked = not paid</text>
    <text x="642" y="680" fill="#3730a3" font-weight="600">Hard allowlist</text><text x="1150" y="680" fill="#475569" text-anchor="end">no generate / checkout / paid-unlock / full markdown / evidence</text>
  </g>
  <text x="642" y="697" fill="#6366f1" font-size="9.5" font-style="italic">bearer auth required in HTTP mode (>=24 chars, no placeholders)</text>

  <!-- Principles footer -->
  <rect x="32" y="726" width="1136" height="150" rx="10" fill="#0b1f3a"/>
  <text x="56" y="756" fill="#ffffff" font-size="14" font-weight="700">Principles worth stealing</text>
  <g fill="#cdd9ea" font-size="12">
    <text x="56" y="782">1.  The contract is the interface -- a brief + asset schema, filled and gated, not a UI.</text>
    <text x="56" y="804">2.  Triage before you build -- "should this exist?" beats efficiently producing polished landfill.</text>
    <text x="56" y="826">3.  The LLM produces evidence, not verdicts -- gates block hard failures, models cite risks, humans decide, the market settles it.</text>
    <text x="56" y="848">4.  Risk-tier the burden -- heavy review for what can hurt you, light for what can't.</text>
    <text x="620" y="782">5.  Publish is the midpoint -- define the experiment first, measure, give a structured verdict.</text>
    <text x="620" y="804">6.  Two flywheels -- kill the repeat (miss -&gt; gate) and clone the winner (win -&gt; prior).</text>
    <text x="620" y="826">7.  One living source of truth, queried before every brief -- ledger, registry, voice, calibration.</text>
    <text x="620" y="848" fill="#7f9bc2">The job isn't to make humans or models reliable -- it's to make unreliability visible, logged, and harder to repeat.</text>
  </g>
</svg>
