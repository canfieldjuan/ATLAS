services:
  # NocoDB — browser UI over the CRM tables in Atlas's local Postgres.
  # Connects to native Postgres on the host via host.docker.internal.
  # Admin UI: http://localhost:8090
  nocodb:
    image: nocodb/nocodb:latest
    container_name: atlas_nocodb
    restart: unless-stopped
    ports:
      - "8090:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - atlas_nocodb_data:/usr/app/data
    environment:
      NC_DB: "pg://host.docker.internal:5433?u=${ATLAS_DB_USER:-atlas}&p=${ATLAS_DB_PASSWORD:-atlas_dev_password}&d=${ATLAS_DB_DATABASE:-atlas}"

  brain:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./atlas_brain:/app/atlas_brain
      - ./logs:/app/logs
      - ./models:/app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database connection (native Postgres on host)
      ATLAS_DB_ENABLED: "true"
      ATLAS_DB_HOST: host.docker.internal
      ATLAS_DB_PORT: "5433"
      ATLAS_DB_DATABASE: ${ATLAS_DB_DATABASE:-atlas}
      ATLAS_DB_USER: ${ATLAS_DB_USER:-atlas}
      ATLAS_DB_PASSWORD: ${ATLAS_DB_PASSWORD:-atlas_dev_password}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    container_name: atlas_brain

volumes:
  atlas_nocodb_data:
